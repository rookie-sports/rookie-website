<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOKIE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        main {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            margin-bottom: 1.5rem;
            color: #ffffff;
            text-transform: uppercase;
        }

        p {
            font-size: 1.125rem;
            font-weight: 400;
            color: #b0b0b0;
            line-height: 1.6;
            letter-spacing: 0.02em;
        }

        /* Responsive design for mobile */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            p {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            
            p {
                font-size: 0.9375rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>ROOKIE</h1>
        <p>Converting human energy into value.</p>
    </main>
</body>
</html>
